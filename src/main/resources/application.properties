spring.application.name=StaySuite

server.port=8080

# Configuración de la Base de Datos (MySQL)
# Asegúrate de que el puerto sea el 3306 (por defecto en MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/staysuite_db
spring.datasource.username=root
spring.datasource.password=200531
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
# Cambiamos el dialecto a MySQL8 (funciona bien para versiones 5.7 y 8+)
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true

# Recomendado: Formatear el SQL en consola para mejor lectura
spring.jpa.properties.hibernate.format_sql=true